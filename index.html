<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=700;900&family=IM+Fell+English&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:'Cinzel', serif;
}

.launcher{
    position:relative;
    width: 100vw;
    height: 100vh;
    background:url("https://i.postimg.cc/brfCLmLW/videoframe-20020-(1).png");
    background-repeat:no-repeat;
    background-position:center;
    background-size:cover; 
    --w: 100vw;
    --h: 100vh;
}

@media (min-aspect-ratio: 16/9) {
    .launcher { --h: calc(100vw * 9 / 16); }
}
@media (max-aspect-ratio: 16/9) {
    .launcher { --w: calc(100vh * 16 / 9); }
}

.left-panel{
    position:absolute;
    left: calc(50% - (var(--w) * 0.42)); 
    top: calc(50% - (var(--h) * 0.245));
    width: calc(var(--w) * 0.18);
    height: calc(var(--h) * 0.53);
    overflow-y:auto;
    overflow-x:hidden;
    padding-top:0; 
    padding-left:1%;
    padding-right:1%;
}

.left-panel::-webkit-scrollbar, .right-content::-webkit-scrollbar {
    width: 4px;
}
.left-panel::-webkit-scrollbar-thumb, .right-content::-webkit-scrollbar-thumb {
    background: rgba(140, 96, 48, 0.4);
    border-radius: 2px;
}

.panel-label{
    color:#8c6030;
    font-size: calc(var(--w) * 0.017);
    letter-spacing: calc(var(--w) * 0.0024);
    margin-bottom: calc(var(--w) * 0.016);
    margin-top: calc(var(--w) * 0.01);
    text-transform:uppercase;
    padding-left: calc(var(--w) * 0.01);
}

.nav-tree{
    display:flex;
    flex-direction:column;
    gap: calc(var(--w) * 0.0025);
    padding-left: calc(var(--w) * 0.01);
}

.tree-section{ width:100%; }

.tree-header{
    display:flex;
    align-items:center;
    width:100%;
    padding: calc(var(--w) * 0.007) calc(var(--w) * 0.009);
    color:#d8c39d;
    font-size: calc(var(--w) * 0.0135);
    font-weight:700;
    cursor:pointer;
    transition:0.15s;
}

.tree-header:hover, .tree-header.open{ color:#ffc95d; }

.tree-arrow{
    margin-right: calc(var(--w) * 0.0055);
    font-size: calc(var(--w) * 0.011);
    transition:0.2s;
}

.tree-header.open .tree-arrow{ transform:rotate(90deg); }

.tree-children{
    display:none;
    padding-left: calc(var(--w) * 0.01);
    margin-top: calc(var(--w) * 0.002);
}

.tree-children.visible{ display:block; }

.tree-child{
    position:relative;
    padding: calc(var(--w) * 0.0058) calc(var(--w) * 0.007) calc(var(--w) * 0.0058) calc(var(--w) * 0.015);
    color:#d8c39d;
    font-size: calc(var(--w) * 0.0125);
    font-weight:700;
    cursor:pointer;
    transition:0.15s;
}

.tree-child::before{
    content:"•";
    position:absolute;
    left: calc(var(--w) * 0.0015);
    color:#d3a85c;
}

.tree-child:hover, .tree-child.active{ color:#ffc95d; }

.right-panel{
    position:absolute;
    left: calc(50% - (var(--w) * 0.18));
    top: calc(50% - (var(--h) * 0.292));
    width: calc(var(--w) * 0.52);
    height: calc(var(--h) * 0.60);
}

.right-content{
    width:100%;
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    padding:4% 2% 3% 6%;
}

.content-title{
    color:#f3ead7;
    font-size: calc(var(--w) * 0.035);
    font-weight:900;
    margin-bottom: calc(var(--w) * 0.01);
    line-height:1;
}

.record-bar{
    display:flex;
    align-items:center;
    width:108%;
    margin-left:-4%;
    padding-bottom: calc(var(--w) * 0.009);
    margin-bottom: calc(var(--w) * 0.012);
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.record-left{ display:flex; align-items:center; gap: calc(var(--w) * 0.005); }
.record-tag{ color:#e2be72; font-size: calc(var(--w) * 0.0155); }
.record-date{ margin-left:auto; color:#d7c5a0; font-size: calc(var(--w) * 0.018); font-family:'IM Fell English', serif; }

.note-list{ display:flex; flex-direction:column; gap: calc(var(--w) * 0.01); }
.note-item{ color:#d7cbb8; font-size: calc(var(--w) * 0.0155); line-height:1.45; font-family:'IM Fell English', serif; }
.placeholder{ color:#c7a56d; font-size: calc(var(--w) * 0.0155); font-style:italic; font-family:'IM Fell English', serif; }

.bg-music {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
}
</style>
</head>

let activeIntervals = [];
const glyphs = "!@#$*()_+[]{}?;:<>%&";
const typingSound = document.getElementById('typingSound');

typingSound.volume = 0.3; 
let isWritingActive = false;
let animationFrameId = null;
let isFirstPlay = true; 

function monitorAudioLoop() {
    if (!isWritingActive) return;

    if (typingSound.currentTime >= 0.5) {
        if (isFirstPlay) { isFirstPlay = false; }
        typingSound.currentTime = 0.3;
        typingSound.play().catch(() => {});
    }
    animationFrameId = requestAnimationFrame(monitorAudioLoop);
}

function startLoop() {
    isWritingActive = true;
    isFirstPlay = true; 
    typingSound.currentTime = 0; 
    typingSound.play().catch(() => {});
    animationFrameId = requestAnimationFrame(monitorAudioLoop);
}

function stopLoop() {
    isWritingActive = false;
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    typingSound.pause();
    typingSound.currentTime = 0;
    isFirstPlay = true; 
}

function clearAllAnimations() {
    activeIntervals.forEach(interval => clearInterval(interval));
    activeIntervals = [];
    stopLoop();
    const completeSound = document.getElementById('completeSound');
    completeSound.pause();
    completeSound.currentTime = 0;
}

function animateSingleLine(element, targetText) {
    return new Promise((resolve) => {
        const fullText = "- " + targetText;
        let revealedCharacters = 0;

        const interval = setInterval(() => {
            let output = "";
            for (let i = 0; i < fullText.length; i++) {
                if (i < revealedCharacters) {
                    output += fullText[i];
                } else if (fullText[i] === " ") {
                    output += " ";
                } else {
                    output += glyphs[Math.floor(Math.random() * glyphs.length)];
                }
            }
            element.textContent = output;

            if (revealedCharacters >= fullText.length) {
                clearInterval(interval);
                resolve();
            }
            revealedCharacters += 1;
        }, 12);
        activeIntervals.push(interval);
    });
}

async function renderNotesSequentially(notesArray, container) {
    startLoop();
    for (let i = 0; i < notesArray.length; i++) {
        const p = document.createElement('p');
        p.className = 'note-item';
        container.appendChild(p);
        await animateSingleLine(p, notesArray[i]);
    }
    stopLoop();
    const completeSound = document.getElementById('completeSound');
    completeSound.play().catch(() => {});
}

function showContent(title, val) {
    clearAllAnimations();
    document.getElementById('contentTitle').textContent = title;
    document.getElementById('recordTag').textContent = val.record ? `Registro ${val.record}` : 'Registro Geral';
    document.getElementById('recordDate').textContent = val.date || '984.XX.XX';
    
    const list = document.getElementById('noteList');
    list.innerHTML = '';

    const notesArray = val.notes || [];
    if (notesArray.length === 0) return;

    renderNotesSequentially(notesArray, list);
    document.getElementById('rightContent').scrollTop = 0;
}

function buildTree(items, container, currentSyndicate = null) {
    Object.entries(items).forEach(([key, val]) => {
        const sec = document.createElement('div');
        sec.className = 'tree-section';
        
        let syndicateContext = currentSyndicate;
        if (musicMap[key] && key !== "default") {
            syndicateContext = key;
        }

        if (val.children) {
            const hdr = document.createElement('div');
            hdr.className = 'tree-header';
            hdr.innerHTML = `<span class="tree-arrow">▶</span>${key}`;
            
            hdr.onclick = (e) => {
                e.stopPropagation();
                const ch = sec.querySelector('.tree-children');
                const isOpen = ch.classList.contains('visible');
                
                if (isOpen) {
                    ch.classList.remove('visible');
                    hdr.classList.remove('open');
                } else {
                    ch.classList.add('visible');
                    hdr.classList.add('open');
                }
                
                if (musicMap[key] && key !== "default") {
                    changeBackgroundMusic(key);
                } else if (!syndicateContext) {
                    changeBackgroundMusic("default");
                }
                
                if(val.notes){
                    document.querySelectorAll('.tree-child.active').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tree-header.open').forEach(x => { if(x !== hdr) x.classList.remove('open') });
                    showContent(key, val);
                }
            };
            sec.appendChild(hdr);
            const ch = document.createElement('div');
            ch.className = 'tree-children';
            buildTree(val.children, ch, syndicateContext);
            sec.appendChild(ch);
        } else {
            const c = document.createElement('div');
            c.textContent = key;
            c.className = 'tree-child';
            c.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.tree-child.active').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                
                if (syndicateContext) {
                    changeBackgroundMusic(syndicateContext);
                } else {
                    changeBackgroundMusic("default");
                }
                
                showContent(key, val);
            };
            sec.appendChild(c);
        }
        container.appendChild(sec);
    });
}

buildTree(data, document.getElementById('navTree'));
